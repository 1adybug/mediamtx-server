logLevel: info
logDestinations: [stdout]
logStructured: false
logFile: mediamtx.log
sysLogPrefix: mediamtx
dumpPackets: false

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1452
udpReadBufferSize: 0

runOnConnect:
runOnConnectRestart: false
runOnDisconnect:

authMethod: internal

authInternalUsers:
    - user: any
      pass:
      ips: []
      permissions:
          - action: publish
            path:
          - action: read
            path:
          - action: playback
            path:

    - user: admin
      pass: change-me
      ips: []
      permissions:
          - action: api
          - action: metrics
          - action: pprof

authHTTPAddress:
authHTTPFingerprint:
authHTTPExclude:
    - action: api
    - action: metrics
    - action: pprof

authJWTJWKS:
authJWTJWKSFingerprint:
authJWTClaimKey: mediamtx_permissions
authJWTExclude: []
authJWTIssuer:
authJWTAudience:

api: true
apiAddress: :9997
apiEncryption: false
apiServerKey: /certs/server.key
apiServerCert: /certs/server.crt
apiAllowOrigins: ["*"]
apiTrustedProxies: []

metrics: true
metricsAddress: :9998
metricsEncryption: false
metricsServerKey: /certs/server.key
metricsServerCert: /certs/server.crt
metricsAllowOrigins: ["*"]
metricsTrustedProxies: []

pprof: true
pprofAddress: :9999
pprofEncryption: false
pprofServerKey: /certs/server.key
pprofServerCert: /certs/server.crt
pprofAllowOrigins: ["*"]
pprofTrustedProxies: []

playback: true
playbackAddress: :9996
playbackEncryption: false
playbackServerKey: /certs/server.key
playbackServerCert: /certs/server.crt
playbackAllowOrigins: ["*"]
playbackTrustedProxies: []

rtsp: true
rtspTransports: [udp, multicast, tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: /certs/server.key
rtspServerCert: /certs/server.crt
rtspAuthMethods: [basic]

rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935
rtmpsAddress: :1936
rtmpServerKey: /certs/server.key
rtmpServerCert: /certs/server.crt

hls: true
hlsAddress: :8888
hlsEncryption: false
hlsServerKey: /certs/server.key
hlsServerCert: /certs/server.crt
hlsAllowOrigins: ["*"]
hlsTrustedProxies: []
hlsAlwaysRemux: false
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ""
hlsMuxerCloseAfter: 60s

webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcServerKey: /certs/server.key
webrtcServerCert: /certs/server.crt
webrtcAllowOrigins: ["*"]
webrtcTrustedProxies: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []
webrtcICEServers2: []
webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

srt: true
srtAddress: :8890

pathDefaults:
    source: publisher
    sourceFingerprint:
    sourceOnDemand: false
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 10s
    maxReaders: 0
    srtReadPassphrase:
    useAbsoluteTimestamp: false

    alwaysAvailable: false
    alwaysAvailableTracks: []
    alwaysAvailableFile: ""

    record: false
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: fmp4
    recordPartDuration: 1s
    recordMaxPartSize: 50M
    recordSegmentDuration: 1h
    recordDeleteAfter: 1d

    overridePublisher: true
    srtPublishPassphrase:
    rtspDemuxMpegts: false

    rtspTransport: automatic
    rtspAnyPort: false
    rtspRangeType:
    rtspRangeStart:
    rtspUDPSourcePortRange: [10000, 65535]

    rtpSDP:

    whepBearerToken: ""
    whepSTUNGatherTimeout: 5s
    whepHandshakeTimeout: 10s
    whepTrackGatherTimeout: 2s

    sourceRedirect:

    rpiCameraCamID: 0
    rpiCameraSecondary: false
    rpiCameraWidth: 1920
    rpiCameraHeight: 1080
    rpiCameraHFlip: false
    rpiCameraVFlip: false
    rpiCameraBrightness: 0
    rpiCameraContrast: 1
    rpiCameraSaturation: 1
    rpiCameraSharpness: 1
    rpiCameraExposure: normal
    rpiCameraAWB: auto
    rpiCameraAWBGains: [0, 0]
    rpiCameraDenoise: "off"
    rpiCameraShutter: 0
    rpiCameraMetering: centre
    rpiCameraGain: 0
    rpiCameraEV: 0
    rpiCameraROI:
    rpiCameraHDR: false
    rpiCameraTuningFile:
    rpiCameraMode:
    rpiCameraFPS: 30
    rpiCameraAfMode: continuous
    rpiCameraAfRange: normal
    rpiCameraAfSpeed: normal
    rpiCameraLensPosition: 0.0
    rpiCameraAfWindow:
    rpiCameraFlickerPeriod: 0
    rpiCameraTextOverlayEnable: false
    rpiCameraTextOverlay: "%Y-%m-%d %H:%M:%S - MediaMTX"
    rpiCameraCodec: auto
    rpiCameraIDRPeriod: 60
    rpiCameraBitrate: 5000000
    rpiCameraHardwareH264Profile: main
    rpiCameraHardwareH264Level: "4.1"
    rpiCameraSoftwareH264Profile: baseline
    rpiCameraSoftwareH264Level: "4.1"
    rpiCameraMJPEGQuality: 60

    runOnInit:
    runOnInitRestart: false

    runOnDemand:
    runOnDemandRestart: false
    runOnDemandStartTimeout: 10s
    runOnDemandCloseAfter: 10s
    runOnUnDemand:

    runOnReady:
    runOnReadyRestart: false
    runOnNotReady:

    runOnRead:
    runOnReadRestart: false
    runOnUnread:

    runOnRecordSegmentCreate:

    runOnRecordSegmentComplete:

paths:
    all_others:
